# Maestro smoke flow para Mobile (iOS + Android).
#
# Pre-requisitos:
#   1. Maestro CLI instalado: https://maestro.mobile.dev/getting-started/installing-maestro
#      (no es un paquete npm; es un binario que se instala con curl).
#   2. Build de la app corriendo en simulador/emulador o device fisico:
#      iOS: `npx expo run:ios`
#      Android: `npx expo run:android`
#   3. Para iOS, el bundle id default es 'com.theappdiscipline.tadAppTemplateMobile'.
#      Si lo cambiaste en app.json, ajusta el campo `appId` abajo.
#
# Uso:
#   maestro test .maestro/smoke.yaml
#   o desde npm: npm run e2e
#
# Limitaciones:
#   - Smoke minimo. No prueba auth, sync, ni interacciones complejas.
#   - El template arranca en un Stack vacio (HomeScreen retorna null), asi que el smoke
#     solo verifica que la app carga sin crash. Cuando agregues UI en Slice 1, ajusta
#     este flow para validar la UI real.

appId: com.theappdiscipline.app

---

- launchApp:
    clearState: true
- assertVisible:
    text: "Home"
- takeScreenshot: home-launched
